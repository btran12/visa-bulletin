name: Monthly Visa Bulletin Update

on:
  schedule:
    # Run on the 15th of every month at 09:00 UTC
    - cron: '0 9 15 * *'
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  update-bulletin:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # Install common scraping dependencies
          pip install requests beautifulsoup4 lxml
      
      - name: Run monthly update
        run: |
          chmod +x update.sh
          ./update.sh
      
      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.git-check.outputs.changes_detected == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/*.json index.html
          git commit -m "Auto-update: Visa Bulletin $(date +%Y-%m)" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts (optional)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visa-bulletin-data
          path: |
            data/*.json
            index.html
          retention-days: 30
